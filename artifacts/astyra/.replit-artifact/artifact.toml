kind = "web"
previewPath = "/"
title = "Astyra – Makeup Try-On"
version = "1.0.0"
id = "artifacts/astyra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25274

[services.development]
run = "pnpm --filter @workspace/astyra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astyra", "run", "build" ]
publicDir = "artifacts/astyra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25274"
BASE_PATH = "/"
